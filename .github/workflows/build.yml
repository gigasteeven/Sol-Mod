name: Build Geode Mod

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - name: Checkout mod source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build Win64 Geode package
        uses: geode-sdk/build-geode-mod@v1
        with:
          target: win
          sdk: v5.7.1
          combine: true

      - name: Upload compiled geode package
        uses: actions/upload-artifact@v4
        with:
          name: sol-spout-layout-win64
          path: build/*.geode
          if-no-files-found: error

      - name: Upload debug symbols
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sol-spout-layout-symbols
          path: build/**/*.pdb
          if-no-files-found: ignore
